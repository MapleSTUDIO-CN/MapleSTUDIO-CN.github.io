            padding: 0;

            transition: background-color 0.4s ease, color 0.4s ease;

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background: var(--topbar-bg);

            align-items: center;

            transition: all 0.4s ease;

        .top-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--topbar-text);
            text-decoration: none;
            white-space: nowrap;

        .right-actions {

            height: 48px;
            border-radius: 12px;

            right: 0;

            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);

            padding: 8px 0;
            min-width: 150px;

            pointer-events: none;
            transform-origin: top right;
        }

        .translate-dropdown.open {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: all;
        }

            display: block;
            color: var(--text-primary);
            text-decoration: none;
            padding: 10px 20px;
            font-size: 0.95rem;

        .translate-dropdown a:hover {
            background: var(--accent-blue);
        }

            border: none;

            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;

            color: var(--text-primary);

            border-radius: 16px;

            font-size: 1rem;

        .menu.open a {

            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(24px);
        }

        .donate-card.visible {

            transform: translateY(0);

            color: var(--text-primary);
            margin-bottom: 6px;
            position: relative;
            z-index: 1;

            font-size: 0.9rem;
            color: var(--text-tertiary);
            margin-bottom: 18px;
            line-height: 1.5;
            position: relative;
            z-index: 1;

            height: 2px;
            border-radius: 2px;
            background: var(--divider-color);

            position: relative;
            z-index: 1;

        }

            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--ad-placeholder-bg);
            border-radius: 14px;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .ad-wrapper ins {
            display: block;
            width: 100%;
            min-height: 280px;

        .ad-placeholder-note {
            position: absolute;
            pointer-events: none;
            font-size: 0.78rem;
            color: var(--ad-placeholder-text);
            text-align: center;
            z-index: 0;

            overflow: hidden;

            z-index: 1;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);

            width: 100%;
            height: auto;
            display: block;
            border-radius: 14px;
            object-fit: cover;
        }

        .qr-tip {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-top: 12px;
            position: relative;
            z-index: 1;
            opacity: 0.8;

            left: 0;
            width: 100%;

            padding: 12px 0 10px;
            border-top: 1px solid var(--border-light);

            text-decoration: none;

            .donate-section {

            }
            .ad-wrapper {
                max-width: 100%;
                min-height: 250px;
            }
            .ad-wrapper ins {
                min-height: 250px;
            }

        const defaultTexts = new Map();

        function cacheDefaultTexts() {
            document.querySelectorAll('[data-translate-key]').forEach(el => {
                const key = el.getAttribute('data-translate-key');
                if (key && !defaultTexts.has(key)) {
                    defaultTexts.set(key, el.textContent);
                }
            });
        }

        function applyLanguage(lang) {
            const titleEl = document.querySelector('title[data-translate-key]');
            if (titleEl) {
                const key = titleEl.getAttribute('data-translate-key');
                if (lang === 'zh-CN') {
                    titleEl.textContent = defaultTexts.get(key) || '支持枫树 · 扫码捐赠 & 广告支持';
                } else {
                    const langPack = translations[lang];
                    if (langPack && langPack[key]) titleEl.textContent = langPack[key];
                }
            }
            document.querySelectorAll('[data-translate-key]').forEach(el => {
                if (el.tagName === 'TITLE') return;
                const key = el.getAttribute('data-translate-key');
                if (!key) return;
                if (lang === 'zh-CN') {
                    const defaultText = defaultTexts.get(key);
                    if (defaultText !== undefined) el.textContent = defaultText;
                } else {
                    const langPack = translations[lang];
                    if (langPack && langPack[key] !== undefined) el.textContent = langPack[key];
                }
            });
            localStorage.setItem('preferredLanguage', lang);
        }

        function toggleMenu() {
            const menu = document.getElementById('menu');
            const btn = document.getElementById('menuBtn');
            menu.classList.toggle('open');
            btn.classList.toggle('active');
        }

        // 翻译下拉
        const translateBtn = document.getElementById('translateBtn');
        const translateDropdown = document.getElementById('translateDropdown');
        translateBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            translateDropdown.classList.toggle('open');
        });
        translateDropdown.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const lang = this.getAttribute('data-lang');
                applyLanguage(lang);
                translateDropdown.classList.remove('open');
            });
        });

        document.addEventListener('click', (e) => {
            const menu = document.getElementById('menu');
            const btn = document.getElementById('menuBtn');
            if (!menu.contains(e.target) && !btn.contains(e.target) && menu.classList.contains('open')) {
                toggleMenu();
            }
            if (!translateDropdown.contains(e.target) && !translateBtn.contains(e.target)) {
                translateDropdown.classList.remove('open');
            }
        });

        // 主题切换
        const themeBtn = document.getElementById('themeBtn');
        const htmlEl = document.documentElement;

        function getCurrentTheme() {
            return htmlEl.getAttribute('data-theme') || 'dark';
        }

        function updateThemeIcon(theme) {
            themeBtn.textContent = theme === 'light' ? '☀️' : '🌙';
        }

        function applyTheme(theme) {
            htmlEl.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateThemeIcon(theme);
        }

        (function initThemeIconNow() {
            updateThemeIcon(getCurrentTheme());
        })();

        themeBtn.addEventListener('click', () => {
            const newTheme = getCurrentTheme() === 'light' ? 'dark' : 'light';
            applyTheme(newTheme);
        });

        // 卡片入场动画
        function setupCardAnimations() {
            const cards = document.querySelectorAll('.donate-card');
            if ('IntersectionObserver' in window) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.15, rootMargin: '0px 0px -30px 0px' });
                cards.forEach(card => observer.observe(card));
            } else {
                cards.forEach((card, index) => {
                    setTimeout(() => card.classList.add('visible'), 200 + index * 150);
                });
            }
        }

        // 广告占位观察
        function setupAdObserver() {
            const adWrapper = document.getElementById('adWrapper');
            const placeholder = adWrapper.querySelector('.ad-placeholder-note');
            if (!placeholder) return;
            if ('MutationObserver' in window) {
                const observer = new MutationObserver(() => {
                    const insEl = adWrapper.querySelector('ins');
                    if (insEl && insEl.clientHeight > 10) {
                        placeholder.style.opacity = '0';
                        setTimeout(() => {
                            if (insEl.clientHeight > 10) placeholder.style.display = 'none';
                        }, 800);
                        observer.disconnect();
                    }
                });
                observer.observe(adWrapper, { childList: true, subtree: true, attributes: true });
                setTimeout(() => {
                    const insEl = adWrapper.querySelector('ins');
                    if (!insEl || insEl.clientHeight < 10) placeholder.style.opacity = '0.35';
                }, 5000);
            }
        }
        cacheDefaultTexts();
        const savedLang = localStorage.getItem('preferredLanguage') || 'zh-CN';
        applyLanguage(savedLang);
        document.getElementById('menu').classList.remove('open');
        setupCardAnimations();
        setupAdObserver();

        // 页面可见性变化时尝试刷新未加载的广告
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                const adWrapper = document.getElementById('adWrapper');
                const insEl = adWrapper ? adWrapper.querySelector('ins') : null;
                if (insEl && insEl.clientHeight < 10 && window.adsbygoogle) {
                    try { window.adsbygoogle.push({}); } catch (e) { /* 静默处理 */ }
                }
            }
        });
    </script>
</body>
</html>
