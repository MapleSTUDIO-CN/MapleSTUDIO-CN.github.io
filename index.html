<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枫叶工作室</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* 黑夜变量 */
            --bg-color: #0a0c10;
            --glass-white: rgba(255, 255, 255, 0.07);
            --glass-menu: rgba(30, 30, 40, 0.7);
            --accent-blue: rgba(0, 160, 255, 0.6);
            --border-light: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f4fa;
            --text-secondary: rgba(180, 230, 255, 0.95);
            --topbar-bg: rgba(255, 255, 255, 0.75);
            --topbar-text: rgba(0, 0, 0, 0.8);
            --shadow-color: rgba(0, 0, 0, 0.5);
            --gradient-start: #1a1f2a;
            --gradient-end: #0a0c10;
            --footer-bg: rgba(10, 15, 20, 0.3);
            --donate-bg: rgba(20, 30, 45, 0.6);
        }

        /* 白天变量 */
        [data-theme="light"] {
            --bg-color: #f0f4f8;
            --glass-white: rgba(255, 255, 255, 0.6);
            --glass-menu: rgba(240, 242, 250, 0.9);
            --accent-blue: rgba(0, 120, 255, 0.8);
            --border-light: rgba(0, 0, 0, 0.08);
            --text-primary: #1a1d29;
            --text-secondary: rgba(30, 35, 50, 0.9);
            --topbar-bg: rgba(255, 255, 255, 0.9);
            --topbar-text: rgba(30, 35, 50, 0.9);
            --shadow-color: rgba(0, 0, 0, 0.15);
            --gradient-start: #e8ecf5;
            --gradient-end: #f5f7fa;
            --footer-bg: rgba(255, 255, 255, 0.5);
            --donate-bg: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 30% 40%, var(--gradient-start) 0%, var(--gradient-end) 70%);
            background-attachment: fixed;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* 顶部栏 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background: var(--topbar-bg);
            backdrop-filter: blur(16px) saturate(200%);
            -webkit-backdrop-filter: blur(16px) saturate(200%);
            display: flex;
            align-items: center;
            padding-left: 24px;
            padding-right: 24px;
            box-shadow: 0 4px 20px var(--shadow-color);
            z-index: 1000;
            border-bottom: 1px solid var(--border-light);
            transition: all 0.4s ease;
        }

        .top-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--topbar-text);
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .top-title:hover {
            text-decoration: underline;
            transform: translateX(-50%) scale(1.02);
            opacity: 1;
        }

        /* 主题切换 */
        .theme-toggle {
            margin-left: auto;
            background: transparent;
            border: none;
            color: var(--topbar-text);
            font-size: 1.5rem;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .theme-toggle:hover {
            background: rgba(128, 128, 128, 0.15);
            transform: scale(1.1) rotate(15deg);
        }

        /* 菜单按钮 */
        .menu-button {
            background: transparent;
            border: none;
            color: var(--topbar-text);
            font-size: 1.9rem;
            line-height: 1;
            cursor: pointer;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                        background 0.2s;
        }

        .menu-button:hover {
            background: rgba(128, 128, 128, 0.1);
            transform: scale(1.1) rotate(90deg);
        }

        .menu-button.active {
            transform: rotate(180deg);
            background: rgba(0, 160, 255, 0.1);
        }

        /* 侧边菜单 */
        .menu {
            position: fixed;
            top: 80px;
            left: 24px;
            width: 240px;
            background: var(--glass-menu);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border-radius: 24px;
            padding: 8px 0;
            box-shadow: 0 18px 40px var(--shadow-color);
            z-index: 999;
            border: 1px solid var(--border-light);
            transform-origin: top left;
            transform: scale(0.7) translateY(-30px);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                        opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        background-color 0.4s ease;
        }

        .menu.open {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: all;
        }

        .menu a {
            display: block;
            color: var(--text-primary);
            text-decoration: none;
            padding: 14px 24px;
            margin: 6px 12px;
            border-radius: 16px;
            font-weight: 500;
            font-size: 1rem;
            background: transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateX(-16px);
        }

        .menu.open a {
            opacity: 1;
            transform: translateX(0);
        }

        /* 菜单项延迟 */
        .menu a:nth-child(1) { transition-delay: 0.05s; }
        .menu a:nth-child(2) { transition-delay: 0.1s; }
        .menu a:nth-child(3) { transition-delay: 0.15s; }
        .menu a:nth-child(4) { transition-delay: 0.2s; }
        .menu a:nth-child(5) { transition-delay: 0.25s; }

        .menu a:hover {
            background: var(--accent-blue);
            transform: translateX(6px);
            color: var(--text-primary);
            box-shadow: 0 0 12px var(--accent-blue);
        }

        /* 3D容器 */
        .content-container {
            position: relative;
            perspective: 500px;
            margin: 20px;
            display: inline-block;
        }

        /* 玻璃层 */
        .glass-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--glass-white);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-radius: 16px;
            box-shadow: 0 20px 40px var(--shadow-color),
                        inset 0 1px 1px rgba(128, 128, 128, 0.1);
            border: 1px solid var(--border-light);
            transform-style: preserve-3d;
            transition: all 0.4s ease;
        }

        /* 文字层 */
        .content {
            position: relative;
            text-align: center;
            font-size: 2.2rem;
            margin: 30px 40px;
            padding: 30px 40px;
            color: var(--text-secondary);
            text-shadow: 0 4px 20px var(--shadow-color);
            font-weight: 500;
            letter-spacing: 1px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease-out, color 0.4s ease;
            cursor: pointer;
            line-height: 1.4;
        }

        /* 捐献按钮 */
        .donate-button {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 38px;
            background: var(--donate-bg);
            backdrop-filter: blur(16px) saturate(200%);
            -webkit-backdrop-filter: blur(16px) saturate(200%);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 500;
            border: 1px solid var(--border-light);
            box-shadow: 0 10px 25px var(--shadow-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 500;
            letter-spacing: 0.5px;
        }

        .donate-button:hover {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            transform: translateX(-50%) scale(1.05) translateY(-3px);
            box-shadow: 0 18px 30px var(--shadow-color);
        }

        /* 底部信息 */
        .footer {
            position: fixed;
            bottom: 25px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-primary);
            opacity: 0.7;
            text-shadow: 0 2px 5px var(--shadow-color);
            z-index: 500;
            background: var(--footer-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 12px 0 8px;
            border-top: 1px solid var(--border-light);
            transition: all 0.4s ease;
        }

        .footer p {
            margin: 4px 0;
        }

        .footer a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* 弹跳动画 */
        @keyframes bounce {
            0% { transform: scale(1); }
            35% { transform: scale(1.04); }
            60% { transform: scale(0.98); }
            85% { transform: scale(1.01); }
            100% { transform: scale(1); }
        }

        .bounce-effect {
            animation: bounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 响应式 */
        @media (max-width: 700px) {
            .content {
                font-size: 1.7rem;
                margin: 20px;
                padding: 20px;
            }
            .menu {
                width: calc(100% - 48px);
                left: 24px;
            }
            .donate-button {
                bottom: 110px;
                padding: 12px 30px;
                font-size: 1rem;
            }
        }

        @media (max-width: 450px) {
            .content {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <!-- 顶部栏 -->
    <div class="top-bar">
        <button class="menu-button" id="menuBtn" onclick="toggleMenu()">☰</button>
        <a href="#" class="top-title">枫叶工作室</a>
        <button class="theme-toggle" id="themeBtn" aria-label="切换主题">🌙</button>
    </div>

    <!-- 侧边菜单 -->
    <div class="menu" id="menu">
        <a href="/mirror/mirror.html">镜像站(🚧)</a>
        <a href="/mcsever/main.html">MC服务器(🚫)</a>
        <a href="/mcapks.html">MC版本库(🚫)</a>
        <a href="/tools/main.html">小工具(🚫)</a>
        <a href="../main/bulletin_board.html">公告栏</a>
    </div>

    <!-- 3D区域 -->
    <div class="content-container">
        <div class="glass-layer" id="glass-layer"></div>
        <div class="content" id="content">
            欢迎来到枫叶工作室的索引站台，请点击左上方菜单开始
        </div>
    </div>

    <!-- 捐献按钮 -->
    <a href="/rec/rec.html" class="donate-button">为我捐献</a>

    <!-- 底部信息 -->
    <div class="footer">
        <p><a href="readme.html">MapleSTUDIO 版权所有</a></p>
        <p>此站点由 <a href="https://github.com" target="_blank">Github</a> 驱动</p>
        <p><a href="https://icp.gov.moe/?keyword=20250732" target="_blank">萌ICP备20250732号</a></p>
    </div>

    <script>
        // 3D效果逻辑
        const content = document.getElementById('content');
        const glassLayer = document.getElementById('glass-layer');
        const resistance = 0.1; 
        const maxTilt = 20; 
        let isDragging = false;
        let offsetX = 0, offsetY = 0;

        // 移动端触摸
        if (matchMedia('(pointer: coarse)').matches) {
            let startX, startY;
            content.addEventListener('touchstart', (e) => {
                isDragging = true;
                startX = e.touches[0].clientX - offsetX;
                startY = e.touches[0].clientY - offsetY;
            });

            content.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    offsetX = (e.touches[0].clientX - startX) * resistance;
                    offsetY = (e.touches[0].clientY - startY) * resistance;
                    offsetX = Math.max(-maxTilt, Math.min(maxTilt, offsetX));
                    offsetY = Math.max(-maxTilt, Math.min(maxTilt, offsetY));
                    applyTilt();
                }
            });

            content.addEventListener('touchend', () => {
                isDragging = false;
                resetPosition();
            });
        }

        // 桌面端鼠标
        if (matchMedia('(pointer: fine)').matches) {
            document.addEventListener('mousemove', (e) => {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const normX = (e.clientX - centerX) / centerX;
                const normY = (e.clientY - centerY) / centerY;
                offsetX = Math.max(-maxTilt, Math.min(maxTilt, normX * maxTilt * resistance));
                offsetY = Math.max(-maxTilt, Math.min(maxTilt, -normY * maxTilt * resistance));
                applyTilt();
            });

            document.addEventListener('mouseleave', () => {
                resetPosition();
            });
        }

        function applyTilt() {
            content.style.transform = `perspective(500px) rotateX(${offsetY}deg) rotateY(${offsetX}deg)`;
            glassLayer.style.transform = `perspective(500px) rotateX(${offsetY}deg) rotateY(${offsetX}deg) translateZ(-20px)`;
        }

        function resetPosition() {
            content.style.transition = 'transform 0.5s ease-out';
            glassLayer.style.transition = 'transform 0.5s ease-out';
            content.style.transform = 'perspective(500px) rotateX(0) rotateY(0)';
            glassLayer.style.transform = 'perspective(500px) rotateX(0) rotateY(0) translateZ(-20px)';
            setTimeout(() => {
                content.style.transition = 'none';
                glassLayer.style.transition = 'none';
            }, 500);
        }

        // 菜单控制
        function toggleMenu() {
            const menu = document.getElementById('menu');
            const btn = document.getElementById('menuBtn');
            const isOpen = menu.classList.contains('open');

            menu.classList.remove('bounce-effect');
            btn.classList.remove('active');

            if (isOpen) {
                menu.classList.remove('open');
                setTimeout(() => {
                    menu.classList.add('bounce-effect');
                    setTimeout(() => menu.classList.remove('bounce-effect'), 500);
                }, 200);
            } else {
                menu.classList.add('open');
                btn.classList.add('active');
                setTimeout(() => {
                    menu.classList.add('bounce-effect');
                    setTimeout(() => menu.classList.remove('bounce-effect'), 500);
                }, 300);
            }
        }

        // 点击外部关闭
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('menu');
            const btn = document.getElementById('menuBtn');
            if (!menu.contains(e.target) && !btn.contains(e.target) && menu.classList.contains('open')) {
                toggleMenu();
            }
        });

        // 阻止冒泡
        document.getElementById('menu').addEventListener('click', (e) => e.stopPropagation());

        // 主题切换
        const themeBtn = document.getElementById('themeBtn');
        const html = document.documentElement;
        
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            html.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function updateThemeIcon(theme) {
            themeBtn.textContent = theme === 'light' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        if (themeBtn) {
            themeBtn.addEventListener('click', toggleTheme);
        }

        // 初始关闭
        window.addEventListener('load', () => {
            document.getElementById('menu').classList.remove('open');
            initTheme();
        });
    </script>
</body>
</html>
