<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枫叶工作室 - MC服务器列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0a0c10;
            --glass-white: rgba(255, 255, 255, 0.07);
            --glass-menu: rgba(30, 30, 40, 0.75);
            --glass-card: rgba(20, 22, 30, 0.65);
            --accent-blue: rgba(0, 160, 255, 0.6);
            --accent-green: rgba(80, 220, 120, 0.7);
            --accent-orange: rgba(255, 170, 60, 0.7);
            --accent-purple: rgba(180, 100, 240, 0.7);
            --accent-cyan: rgba(60, 210, 210, 0.7);
            --border-light: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f4fa;
            --text-secondary: rgba(200, 220, 240, 0.9);
            --topbar-bg: rgba(15, 18, 25, 0.85);
            --topbar-text: rgba(220, 230, 245, 0.9);
            --shadow-color: rgba(0, 0, 0, 0.5);
            --gradient-start: #1a1f2a;
            --gradient-end: #0a0c10;
            --footer-bg: rgba(10, 15, 20, 0.35);
            --donate-bg: rgba(20, 30, 45, 0.6);
            --card-hover-glow: rgba(0, 160, 255, 0.15);
            --tag-bg: rgba(0, 0, 0, 0.35);
            --divider-color: rgba(255, 255, 255, 0.06);
            --status-dot-online: #4dff88;
            --status-dot-offline: #8b9dc3;
            --latency-excellent: #4dff88;
            --latency-good: #a8e650;
            --latency-medium: #ffc850;
            --latency-poor: #ff6b6b;
            --copy-btn-bg: rgba(255, 255, 255, 0.08);
            --copy-btn-hover: rgba(0, 160, 255, 0.25);
            --badge-online-bg: rgba(60, 220, 100, 0.12);
            --badge-online-text: #5cff90;
            --badge-offline-bg: rgba(255, 100, 100, 0.12);
            --badge-offline-text: #ff8a8a;
            --scrollbar-thumb: rgba(255, 255, 255, 0.1);
            --scrollbar-track: transparent;
        }

        [data-theme="light"] {
            --bg-color: #eef2f7;
            --glass-white: rgba(255, 255, 255, 0.5);
            --glass-menu: rgba(245, 247, 252, 0.9);
            --glass-card: rgba(255, 255, 255, 0.55);
            --accent-blue: rgba(0, 120, 220, 0.75);
            --accent-green: rgba(40, 180, 90, 0.75);
            --accent-orange: rgba(220, 140, 30, 0.75);
            --accent-purple: rgba(140, 70, 210, 0.7);
            --accent-cyan: rgba(30, 170, 170, 0.7);
            --border-light: rgba(0, 0, 0, 0.06);
            --text-primary: #1a1d29;
            --text-secondary: rgba(30, 38, 55, 0.88);
            --topbar-bg: rgba(255, 255, 255, 0.85);
            --topbar-text: rgba(30, 38, 55, 0.9);
            --shadow-color: rgba(0, 0, 0, 0.12);
            --gradient-start: #e2e8f2;
            --gradient-end: #f0f4f8;
            --footer-bg: rgba(255, 255, 255, 0.45);
            --donate-bg: rgba(255, 255, 255, 0.6);
            --card-hover-glow: rgba(0, 120, 220, 0.1);
            --tag-bg: rgba(0, 0, 0, 0.06);
            --divider-color: rgba(0, 0, 0, 0.05);
            --status-dot-online: #2ecc60;
            --status-dot-offline: #7f8c8d;
            --latency-excellent: #28b850;
            --latency-good: #7cb830;
            --latency-medium: #d49420;
            --latency-poor: #e04545;
            --copy-btn-bg: rgba(0, 0, 0, 0.04);
            --copy-btn-hover: rgba(0, 120, 220, 0.18);
            --badge-online-bg: rgba(40, 180, 80, 0.1);
            --badge-online-text: #1f8a40;
            --badge-offline-bg: rgba(220, 60, 60, 0.1);
            --badge-offline-text: #c0392b;
            --scrollbar-thumb: rgba(0, 0, 0, 0.12);
            --scrollbar-track: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 30% 25%, var(--gradient-start) 0%, var(--gradient-end) 70%);
            background-attachment: fixed;
            transition: background-color 0.4s ease, color 0.4s ease;
            padding-top: 90px;
            padding-bottom: 140px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background: var(--topbar-bg);
            backdrop-filter: blur(20px) saturate(200%);
            -webkit-backdrop-filter: blur(20px) saturate(200%);
            display: flex;
            align-items: center;
            padding-left: 20px;
            padding-right: 20px;
            box-shadow: 0 4px 24px var(--shadow-color);
            z-index: 1000;
            border-bottom: 1px solid var(--border-light);
            transition: all 0.4s ease;
        }

        .top-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--topbar-text);
            text-decoration: none;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }

        .top-title:hover {
            text-decoration: underline;
            opacity: 1;
        }

        .theme-toggle {
            margin-left: auto;
            background: transparent;
            border: none;
            color: var(--topbar-text);
            font-size: 1.4rem;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            background: rgba(128, 128, 128, 0.15);
            transform: scale(1.1) rotate(15deg);
        }

        .menu-button {
            background: transparent;
            border: none;
            color: var(--topbar-text);
            font-size: 1.7rem;
            line-height: 1;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s;
            flex-shrink: 0;
            margin-right: 8px;
        }

        .menu-button:hover {
            background: rgba(128, 128, 128, 0.1);
            transform: scale(1.1) rotate(90deg);
        }

        .menu-button.active {
            transform: rotate(180deg);
            background: rgba(0, 160, 255, 0.1);
        }

        .menu {
            position: fixed;
            top: 80px;
            left: 20px;
            width: 240px;
            background: var(--glass-menu);
            backdrop-filter: blur(28px) saturate(200%);
            -webkit-backdrop-filter: blur(28px) saturate(200%);
            border-radius: 22px;
            padding: 8px 0;
            box-shadow: 0 20px 44px var(--shadow-color);
            z-index: 999;
            border: 1px solid var(--border-light);
            transform-origin: top left;
            transform: scale(0.7) translateY(-30px);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease, background-color 0.4s ease;
        }

        .menu.open {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: all;
        }

        .menu a {
            display: block;
            color: var(--text-primary);
            text-decoration: none;
            padding: 13px 22px;
            margin: 5px 10px;
            border-radius: 14px;
            font-weight: 500;
            font-size: 0.95rem;
            background: transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateX(-16px);
        }

        .menu.open a {
            opacity: 1;
            transform: translateX(0);
        }

        .menu a:nth-child(1) { transition-delay: 0.05s; }
        .menu a:nth-child(2) { transition-delay: 0.1s; }
        .menu a:nth-child(3) { transition-delay: 0.15s; }
        .menu a:nth-child(4) { transition-delay: 0.2s; }
        .menu a:nth-child(5) { transition-delay: 0.25s; }
        .menu a:nth-child(6) { transition-delay: 0.3s; }

        .menu a:hover {
            background: var(--accent-blue);
            transform: translateX(6px);
            color: #fff;
            box-shadow: 0 0 14px var(--accent-blue);
        }

        .page-header {
            text-align: center;
            margin-bottom: 30px;
            z-index: 10;
            position: relative;
        }
        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-primary);
            text-shadow: 0 3px 16px var(--shadow-color);
            margin: 0;
        }
        .page-header .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            opacity: 0.7;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }

        .servers-container {
            position: relative;
            perspective: 800px;
            width: 90%;
            max-width: 820px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            z-index: 10;
        }

        .server-card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.45s cubic-bezier(0.25, 0.1, 0.25, 1), box-shadow 0.45s ease, border-color 0.35s;
            box-shadow: 0 12px 32px var(--shadow-color);
            min-height: 150px;
            display: flex;
            align-items: stretch;
            border: 1px solid var(--border-light);
            background: var(--glass-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transform-style: preserve-3d;
            animation: cardFadeIn 0.6s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .server-card:nth-child(1) { animation-delay: 0.1s; }
        .server-card:nth-child(2) { animation-delay: 0.2s; }
        .server-card:nth-child(3) { animation-delay: 0.3s; }
        .server-card:nth-child(4) { animation-delay: 0.4s; }
        .server-card:nth-child(5) { animation-delay: 0.5s; }

        @keyframes cardFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .server-card:hover {
            transform: translateY(-6px) scale(1.015);
            box-shadow: 0 22px 48px var(--shadow-color), 0 0 40px var(--card-hover-glow);
            border-color: rgba(255, 255, 255, 0.18);
            z-index: 5;
        }

        .server-card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 0.6s ease, filter 0.5s ease;
            z-index: 0;
            filter: brightness(0.55) saturate(0.7);
        }

        .server-card:hover .server-card-bg {
            transform: scale(1.04);
            filter: brightness(0.7) saturate(1);
        }

        .bg-1 { background-image: url('../Pictures/mcbackground1.webp'); }
        .bg-2 { background: linear-gradient(135deg, #1a3a4a 0%, #0d1f2d 30%, #1a3a5c 60%, #0f2840 100%); }
        .bg-3 { background: linear-gradient(135deg, #3d2b1a 0%, #2a1a0d 30%, #4a3020 60%, #2d1c10 100%); }
        .bg-4 { background: linear-gradient(135deg, #1f1835 0%, #140f28 30%, #2a1d48 60%, #1a1235 100%); }
        .bg-5 { background: linear-gradient(135deg, #1a2e28 0%, #0d1c18 30%, #1e3a30 60%, #12241e 100%); }

        .server-card-overlay {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: stretch;
            width: 100%;
            min-height: 150px;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border-radius: 20px;
        }

        [data-theme="light"] .server-card-overlay {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
        }

        .server-card:hover .server-card-overlay {
            background: rgba(0, 0, 0, 0.12);
            backdrop-filter: blur(1px);
            -webkit-backdrop-filter: blur(1px);
        }

        [data-theme="light"] .server-card:hover .server-card-overlay {
            background: rgba(255, 255, 255, 0.08);
        }

        .server-card-content {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            width: 100%;
            padding: 20px 24px;
            gap: 20px;
        }

        .server-thumb {
            flex-shrink: 0;
            width: 90px;
            height: 90px;
            border-radius: 16px;
            background-size: cover;
            background-position: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .thumb-1 { background-image: url('../Pictures/mcbackground1.webp'); }
        .thumb-2 { background: linear-gradient(135deg, #2d5f7a, #1a3d55); }
        .thumb-3 { background: linear-gradient(135deg, #7a5c30, #4a3520); }
        .thumb-4 { background: linear-gradient(135deg, #4a3090, #2d1860); }
        .thumb-5 { background: linear-gradient(135deg, #2d7860, #184a38); }

        .server-card:hover .server-thumb {
            border-color: rgba(255, 255, 255, 0.45);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
            transform: scale(1.04);
        }

        .thumb-status-dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--status-dot-online);
            box-shadow: 0 0 10px var(--status-dot-online), 0 0 4px rgba(0, 0, 0, 0.3);
            animation: statusPulse 2.5s ease-in-out infinite;
            z-index: 3;
            border: 1.5px solid rgba(255, 255, 255, 0.4);
        }

        .thumb-status-dot.offline {
            background: var(--status-dot-offline) !important;
            box-shadow: 0 0 6px var(--status-dot-offline), 0 0 2px rgba(0, 0, 0, 0.3) !important;
            animation: none !important;
        }

        @keyframes statusPulse {
            0%, 100% { box-shadow: 0 0 8px var(--status-dot-online), 0 0 3px rgba(0, 0, 0, 0.3); }
            50% { box-shadow: 0 0 18px var(--status-dot-online), 0 0 8px var(--status-dot-online), 0 0 3px rgba(0, 0, 0, 0.3); }
        }

        .server-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }

        .server-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        [data-theme="light"] .server-name {
            color: #1a1d29;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .badge-status {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .badge-online {
            background: var(--badge-online-bg);
            color: var(--badge-online-text);
            border: 1px solid rgba(80, 220, 120, 0.2);
        }

        .badge-offline {
            background: var(--badge-offline-bg);
            color: var(--badge-offline-text);
            border: 1px solid rgba(255, 100, 100, 0.2);
        }

        .server-address-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.9);
            background: var(--tag-bg);
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-light);
            transition: all 0.35s ease;
            cursor: pointer;
            user-select: all;
            width: fit-content;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        [data-theme="light"] .server-address-row {
            color: rgba(30, 35, 50, 0.9);
        }

        .server-address-row:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] .server-address-row:hover {
            background: rgba(0, 0, 0, 0.04);
            border-color: rgba(0, 0, 0, 0.2);
        }

        .server-meta-row {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .latency-indicator {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .latency-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 18px;
        }

        .latency-bar {
            width: 4px;
            border-radius: 2px;
            transition: all 0.5s ease;
            background: rgba(255, 255, 255, 0.3);
        }

        .latency-bar.active { background: var(--latency-excellent); box-shadow: 0 0 6px rgba(80, 220, 120, 0.5); }
        .latency-bar.medium { background: var(--latency-good); box-shadow: 0 0 6px rgba(168, 230, 80, 0.4); }
        .latency-bar.slow { background: var(--latency-medium); box-shadow: 0 0 6px rgba(255, 200, 80, 0.4); }

        .latency-value {
            font-family: 'SF Mono', 'Consolas', monospace;
            letter-spacing: 0.2px;
            color: var(--latency-excellent);
        }
        .latency-value.medium-val { color: var(--latency-good); }
        .latency-value.slow-val { color: var(--latency-medium); }
        .latency-value.error-val { color: var(--latency-poor); }

        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            border-radius: 8px;
            background: var(--copy-btn-bg);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-family: inherit;
        }

        .copy-btn:hover {
            background: var(--copy-btn-hover);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        .copy-btn.copied {
            background: rgba(80, 220, 120, 0.2);
            border-color: rgba(80, 220, 120, 0.4);
            color: #5cff90;
            animation: copyBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes copyBounce {
            0% { transform: scale(1); }
            35% { transform: scale(1.08); }
            60% { transform: scale(0.96); }
            85% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .server-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .server-tag {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        [data-theme="light"] .server-tag {
            background: rgba(0, 0, 0, 0.05);
            color: rgba(30, 35, 50, 0.7);
            border-color: rgba(0, 0, 0, 0.08);
        }

        .donate-button {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            padding: 13px 34px;
            background: var(--donate-bg);
            backdrop-filter: blur(16px) saturate(200%);
            -webkit-backdrop-filter: blur(16px) saturate(200%);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            border: 1px solid var(--border-light);
            box-shadow: 0 10px 28px var(--shadow-color);
            transition: all 0.3s ease;
            z-index: 500;
            letter-spacing: 0.5px;
        }

        .donate-button:hover {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            transform: translateX(-50%) scale(1.05) translateY(-3px);
            box-shadow: 0 18px 34px var(--shadow-color);
            color: #fff;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-primary);
            opacity: 0.7;
            text-shadow: 0 2px 5px var(--shadow-color);
            z-index: 500;
            background: var(--footer-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 0 6px;
            border-top: 1px solid var(--border-light);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px 20px;
        }

        .footer p { margin: 2px 0; white-space: nowrap; }
        .footer span { margin: 0 4px; opacity: 0.5; }
        .footer a { color: var(--accent-blue); text-decoration: none; }
        .footer a:hover { opacity: 0.8; text-decoration: underline; }

        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: rgba(40, 200, 100, 0.9);
            color: #fff;
            padding: 10px 22px;
            border-radius: 10px;
            font-weight: 600;

    <script>
        (function() {
            // ---------- 菜单控制 ----------
            function toggleMenu() {
                const menu = document.getElementById('menu');
                const btn = document.getElementById('menuBtn');
                const isOpen = menu.classList.contains('open');
                menu.classList.remove('bounce-effect');
                btn.classList.remove('active');
                if (isOpen) {
                    menu.classList.remove('open');
                } else {
                    menu.classList.add('open');
                    btn.classList.add('active');
                }
            }

            document.getElementById('menuBtn').addEventListener('click', toggleMenu);
            document.addEventListener('click', (e) => {
                const menu = document.getElementById('menu');
                const btn = document.getElementById('menuBtn');
                if (!menu.contains(e.target) && !btn.contains(e.target) && menu.classList.contains('open')) {
                    toggleMenu();
                }
            });
            document.getElementById('menu').addEventListener('click', (e) => e.stopPropagation());

            // ---------- 主题切换 ----------
            const themeBtn = document.getElementById('themeBtn');
            const html = document.documentElement;
            function initTheme() {
                const saved = localStorage.getItem('theme') || 'dark';
                html.setAttribute('data-theme', saved);
                themeBtn.textContent = saved === 'light' ? '☀️' : '🌙';
            }
            themeBtn.addEventListener('click', () => {
                const current = html.getAttribute('data-theme');
                const next = current === 'light' ? 'dark' : 'light';
                html.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                themeBtn.textContent = next === 'light' ? '☀️' : '🌙';
            });
            initTheme();

            // ---------- 复制功能 ----------
            function copyToClipboard(text, btn) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => showCopySuccess(btn)).catch(() => fallbackCopy(text, btn));
                } else {
                    fallbackCopy(text, btn);
                }
            }
            function fallbackCopy(text, btn) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); showCopySuccess(btn); } catch (e) { showToast('复制失败，请手动选择'); }
                document.body.removeChild(ta);
            }
            function showCopySuccess(btn) {
                if (btn) {
                    const original = btn.textContent;
                    btn.classList.add('copied');
                    btn.textContent = '已复制!';
                    setTimeout(() => {
                        btn.classList.remove('copied');
                        btn.textContent = original;
                    }, 1500);
                }
                showToast('IP地址已复制到剪贴板');
            }
            function showToast(msg) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
            }

            window.copyServerIP = function(card, event) {
                if (event.target.closest('.copy-btn')) return;
                const ip = card.getAttribute('data-ip');
                if (ip) copyToClipboard(ip, card.querySelector('.copy-btn'));
            };
            window.copyIPDirect = function(ip, btn) {
                copyToClipboard(ip, btn);
            };

            // ---------- 延迟检测与离线判定 (>3500ms 视为离线) ----------
            const servers = [
                { host: 'maple.9666.fun', port: 40516, latencyId: 'latency-1', barsId: 'bars-1' }
            ];

            function setServerStatus(card, isOnline) {
                const badge = card.querySelector('.badge-status');
                const dot = card.querySelector('.thumb-status-dot');
                if (!badge || !dot) return;

                if (isOnline) {
                    badge.textContent = '● 在线';
                    badge.className = 'badge-status badge-online';
                    dot.classList.remove('offline');
                    dot.title = '在线';
                    dot.style.background = '';
                    dot.style.animation = '';
                } else {
                    badge.textContent = '● 离线';
                    badge.className = 'badge-status badge-offline';
                    dot.classList.add('offline');
                    dot.title = '离线';
                }
            }

            function updateLatencyDisplay(ms, latencyId, barsId, card) {
                const valueEl = document.getElementById(latencyId);
                const barsEl = document.getElementById(barsId);
                if (!valueEl || !barsEl || !card) return;

                const isOffline = ms === null || ms > 3500;

                setServerStatus(card, !isOffline);

                if (ms === null) {
                    valueEl.textContent = '不可达';
                    valueEl.className = 'latency-value error-val';
                } else {
                    valueEl.textContent = ms + 'ms';
                    valueEl.classList.remove('medium-val', 'slow-val', 'error-val');
                    if (ms > 3500) {
                        valueEl.classList.add('error-val');
                    } else if (ms < 40) {
                        valueEl.classList.add('latency-value');
                    } else if (ms < 80) {
                        valueEl.classList.add('medium-val');
                    } else {
                        valueEl.classList.add('slow-val');
                    }
                }

                const bars = barsEl.querySelectorAll('.latency-bar');
                bars.forEach(b => { b.className = 'latency-bar'; b.style.background = ''; });

                if (isOffline) {
                    bars.forEach(b => { b.style.background = 'rgba(255,255,255,0.15)'; });
                } else if (ms < 40) {
                    bars[0].classList.add('active'); bars[0].style.height = '10px';
                    bars[1].classList.add('active'); bars[1].style.height = '14px';
                    bars[2].classList.add('active'); bars[2].style.height = '18px';
                    bars[3].style.height = '18px';
                } else if (ms < 80) {
                    bars[0].classList.add('active'); bars[0].style.height = '10px';
                    bars[1].classList.add('medium'); bars[1].style.height = '14px';
                    bars[2].classList.add('medium'); bars[2].style.height = '18px';
                    bars[3].style.height = '18px';
                } else {
                    bars[0].classList.add('active'); bars[0].style.height = '10px';
                    bars[1].classList.add('medium'); bars[1].style.height = '14px';
                    bars[2].classList.add('slow'); bars[2].style.height = '18px';
                    bars[3].style.height = '18px';
                }
            }

            async function pingServer(host, port) {
                const url = `https://api.mcsrvstat.us/icon/${host}:${port}`;
                const start = Date.now();
                try {
                    await fetch(url, { mode: 'no-cors' });
                    const end = Date.now();
                    return end - start;
                } catch (error) {
                    console.warn(`Ping ${host}:${port} 失败:`, error);
                    return null;
                }
            }

            async function fetchAllLatencies() {
                for (const srv of servers) {
                    const latencyEl = document.getElementById(srv.latencyId);
                    if (!latencyEl) continue;
                    const card = latencyEl.closest('.server-card');
                    const latency = await pingServer(srv.host, srv.port);
                    updateLatencyDisplay(latency, srv.latencyId, srv.barsId, card);
                }
            }

            window.addEventListener('load', () => {
                fetchAllLatencies();
            });

            // ---------- 轻微3D跟踪效果 ----------
            const container = document.getElementById('serversContainer');
            let targetX = 0, targetY = 0, currentX = 0, currentY = 0;
            const maxTilt = 6;
            if (matchMedia('(pointer: fine)').matches) {
                document.addEventListener('mousemove', (e) => {
                    const cx = window.innerWidth / 2;
                    const cy = window.innerHeight / 2;
                    targetX = ((e.clientX - cx) / cx) * maxTilt;
                    targetY = -((e.clientY - cy) / cy) * maxTilt;
                });
                document.addEventListener('mouseleave', () => { targetX = 0; targetY = 0; });
                function animate() {
                    currentX += (targetX - currentX) * 0.1;
                    currentY += (targetY - currentY) * 0.1;
                    if (container) {
                        container.style.transform = `perspective(800px) rotateX(${currentY}deg) rotateY(${currentX}deg)`;
                    }
                    requestAnimationFrame(animate);
                }
                animate();
            }
        })();
    </script>
