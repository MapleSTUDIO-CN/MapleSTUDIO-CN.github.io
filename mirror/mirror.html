<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枫叶镜像源</title>
    <style>
        /* ----- 全局变量 & 重置 ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0a0c10;
            --glass-white: rgba(255, 255, 255, 0.07);
            --glass-white-hover: rgba(255, 255, 255, 0.15);
            --glass-menu: rgba(30, 30, 40, 0.7);
            --accent-blue: rgba(0, 160, 255, 0.6);
            --border-light: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: var(--bg-color);
            color: #f0f4fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            /* 径向光晕避免死黑 */
            background-image: radial-gradient(circle at 30% 40%, #1a1f2a 0%, #0a0c10 70%);
            background-attachment: fixed;
        }

        /* ----- 顶部栏 (毛玻璃高透) ----- */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px) saturate(200%);
            -webkit-backdrop-filter: blur(16px) saturate(200%);
            display: flex;
            align-items: center;
            padding-left: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.25);
        }

        .top-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.25rem;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.8);
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .top-title:hover {
            text-decoration: underline;
            transform: translateX(-50%) scale(1.02);
            color: #000;
        }

        /* 菜单按钮 (旋转动画) */
        .menu-button {
            background: transparent;
            border: none;
            color: rgba(0, 0, 0, 0.8);
            font-size: 1.9rem;
            line-height: 1;
            cursor: pointer;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                        background 0.2s;
        }

        .menu-button:hover {
            background: rgba(0, 0, 0, 0.05);
            transform: scale(1.1) rotate(90deg);
        }

        .menu-button.active {
            transform: rotate(180deg);
            background: rgba(0, 160, 255, 0.1);
        }

        /* ----- 抽拉菜单 (毛玻璃 + 弹性动画已取消回弹) ----- */
        .menu {
            position: fixed;
            top: 80px;
            left: 24px;
            width: 240px;
            background: rgba(35, 35, 45, 0.7);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border-radius: 24px;
            padding: 8px 0;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.5);
            z-index: 999;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transform-origin: top left;
            transform: scale(0.7) translateY(-30px);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                        opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu.open {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: all;
        }

        .menu a {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            padding: 14px 24px;
            margin: 6px 12px;
            border-radius: 16px;
            font-weight: 500;
            font-size: 1rem;
            background: transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateX(-16px);
        }

        .menu.open a {
            opacity: 1;
            transform: translateX(0);
        }

        /* 菜单项交错延迟 */
        .menu a:nth-child(1) { transition-delay: 0.05s; }
        .menu a:nth-child(2) { transition-delay: 0.1s; }
        .menu a:nth-child(3) { transition-delay: 0.15s; }
        .menu a:nth-child(4) { transition-delay: 0.2s; }
        .menu a:nth-child(5) { transition-delay: 0.25s; }

        .menu a:hover {
            background: rgba(0, 160, 255, 0.2);
            transform: translateX(6px);
            color: #fff;
            box-shadow: 0 0 12px var(--accent-blue);
        }

        /* ----- 裸眼3D容器 (圆角16px) ----- */
        .content-container {
            position: relative;
            perspective: 500px;
            margin: 20px;
            display: inline-block;
        }

        /* 玻璃底板 */
        .glass-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--glass-white);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5),
                        inset 0 1px 1px rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transform-style: preserve-3d;
        }

        /* 文字层 */
        .content {
            position: relative;
            text-align: center;
            font-size: 2.2rem;
            margin: 30px 40px;
            padding: 30px 40px;
            color: rgba(180, 230, 255, 0.95);
            text-shadow: 0 4px 20px rgba(0, 160, 255, 0.4);
            font-weight: 500;
            letter-spacing: 1px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease-out;
            cursor: pointer;
            line-height: 1.4;
        }

        /* 底部信息 (毛玻璃半透) */
        .footer {
            position: fixed;
            bottom: 25px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            color: rgba(220, 230, 240, 0.7);
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.4);
            z-index: 500;
            background: rgba(10, 15, 20, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 12px 0 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .footer p {
            margin: 4px 0;
        }

        .footer a {
            color: rgba(100, 180, 255, 0.9);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #a0d0ff;
            text-decoration: underline;
        }

        /* 保留 bounce-effect 动画定义 (但已不再使用) */
        @keyframes bounce {
            0% { transform: scale(1); }
            35% { transform: scale(1.04); }
            60% { transform: scale(0.98); }
            85% { transform: scale(1.01); }
            100% { transform: scale(1); }
        }

        .bounce-effect {
            animation: bounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 响应式调整 */
        @media (max-width: 700px) {
            .content {
                font-size: 1.7rem;
                margin: 20px;
                padding: 20px;
            }
            .menu {
                width: calc(100% - 48px);
                left: 24px;
            }
        }

        @media (max-width: 450px) {
            .content {
                font-size: 1.3rem;
            }
        }

        /* 隐藏未使用的 .main-content (原页面遗留) */
        .main-content {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 顶部毛玻璃栏 -->
    <div class="top-bar">
        <button class="menu-button" id="menuBtn" onclick="toggleMenu()">☰</button>
        <a href="../index.html" class="top-title">枫叶工作室</a>
    </div>

    <!-- 抽拉菜单 (内容与原页面一致) -->
    <div class="menu" id="menu">
        <a href="windows.html">Windows源（维护中）</a>
        <a href="linux.html">Linux源（维护中）</a>
        <a href="macos.html">MacOS源（维护中）</a>
        <a href="others.html">杂项（维护中）</a>
        <a href="../bulletin%20board.html">公告栏</a>
    </div>

    <!-- 裸眼3D区域 -->
    <div class="content-container">
        <div class="glass-layer" id="glass-layer"></div>
        <div class="content" id="content">
            本站旨在收集，整理各种官方镜像并提供下载
        </div>
    </div>

    <!-- 底部信息 -->
    <div class="footer">
        <p><a href="../readme.html">MapleSTUDIO 版权所有</a></p>
        <p>此站点由 <a href="https://github.com" target="_blank">Github</a> 驱动</p>
        <p><a href="https://icp.gov.moe/?keyword=20250732" target="_blank">萌ICP备20250732号</a></p>
    </div>

    <script>
        // ---------- 裸眼3D逻辑 (桌面版监听全页面) ----------
        const content = document.getElementById('content');
        const glassLayer = document.getElementById('glass-layer');

        const resistance = 0.1; 
        const maxTilt = 20; 
        let isDragging = false;
        let offsetX = 0, offsetY = 0;

        // 移动端触摸逻辑 (保持不变，绑定在content上)
        if (matchMedia('(pointer: coarse)').matches) {
            let startX, startY;
            content.addEventListener('touchstart', (e) => {
                isDragging = true;
                startX = e.touches[0].clientX - offsetX;
                startY = e.touches[0].clientY - offsetY;
            });

            content.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    offsetX = (e.touches[0].clientX - startX) * resistance;
                    offsetY = (e.touches[0].clientY - startY) * resistance;
                    offsetX = Math.max(-maxTilt, Math.min(maxTilt, offsetX));
                    offsetY = Math.max(-maxTilt, Math.min(maxTilt, offsetY));
                    applyTilt();
                }
            });

            content.addEventListener('touchend', () => {
                isDragging = false;
                resetPosition();
            });
        }

        // 桌面版：监听整个页面 (pointer: fine)
        if (matchMedia('(pointer: fine)').matches) {
            document.addEventListener('mousemove', (e) => {
                // 计算鼠标相对于窗口中心的比例
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const normX = (e.clientX - centerX) / centerX;
                const normY = (e.clientY - centerY) / centerY;
                // 应用阻力系数和最大角度
                offsetX = Math.max(-maxTilt, Math.min(maxTilt, normX * maxTilt * resistance));
                offsetY = Math.max(-maxTilt, Math.min(maxTilt, -normY * maxTilt * resistance)); // Y方向取反
                applyTilt();
            });

            document.addEventListener('mouseleave', () => {
                resetPosition();
            });
        }

        function applyTilt() {
            content.style.transform = `perspective(500px) rotateX(${offsetY}deg) rotateY(${offsetX}deg)`;
            glassLayer.style.transform = `perspective(500px) rotateX(${offsetY}deg) rotateY(${offsetX}deg) translateZ(-20px)`;
        }

        function resetPosition() {
            content.style.transition = 'transform 0.5s ease-out';
            glassLayer.style.transition = 'transform 0.5s ease-out';
            content.style.transform = 'perspective(500px) rotateX(0) rotateY(0)';
            glassLayer.style.transform = 'perspective(500px) rotateX(0) rotateY(0) translateZ(-20px)';
            setTimeout(() => {
                content.style.transition = 'none';
                glassLayer.style.transition = 'none';
            }, 500);
        }

        // ---------- 菜单切换 (已取消所有回弹动画) ----------
        function toggleMenu() {
            const menu = document.getElementById('menu');
            const btn = document.getElementById('menuBtn');
            const isOpen = menu.classList.contains('open');
            
            if (isOpen) {
                menu.classList.remove('open');
                btn.classList.remove('active');
            } else {
                menu.classList.add('open');
                btn.classList.add('active');
            }
        }

        // 点击外部关闭菜单
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('menu');
            const btn = document.getElementById('menuBtn');
            if (!menu.contains(e.target) && !btn.contains(e.target) && menu.classList.contains('open')) {
                toggleMenu();
            }
        });

        // 防止菜单内点击冒泡干扰
        document.getElementById('menu').addEventListener('click', (e) => e.stopPropagation());

        // 页面加载完成确保菜单初始闭合
        window.addEventListener('load', () => {
            document.getElementById('menu').classList.remove('open');
        });
    </script>
</body>
</html>
