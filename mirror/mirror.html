<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枫叶镜像源</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* 黑夜变量 */
            --bg-color: #0a0c10;
            --glass-white: rgba(255, 255, 255, 0.07);
            --glass-white-hover: rgba(255, 255, 255, 0.15);
            --glass-menu: rgba(30, 30, 40, 0.7);
            --accent-blue: rgba(0, 160, 255, 0.6);
            --border-light: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f4fa;
            --text-secondary: rgba(180, 230, 255, 0.95);
            --topbar-bg: rgba(255, 255, 255, 0.75);
            --topbar-text: rgba(0, 0, 0, 0.8);
            --shadow-color: rgba(0, 0, 0, 0.5);
            --gradient-start: #1a1f2a;
            --gradient-end: #0a0c10;
            --footer-bg: rgba(10, 15, 20, 0.3);
        }

        /* 白天变量 */
        [data-theme="light"] {
            --bg-color: #f0f4f8;
            --glass-white: rgba(255, 255, 255, 0.6);
            --glass-white-hover: rgba(255, 255, 255, 0.8);
            --glass-menu: rgba(240, 242, 250, 0.9);
            --accent-blue: rgba(0, 120, 255, 0.8);
            --border-light: rgba(0, 0, 0, 0.08);
            --text-primary: #1a1d29;
            --text-secondary: rgba(30, 35, 50, 0.9);
            --topbar-bg: rgba(255, 255, 255, 0.9);
            --topbar-text: rgba(30, 35, 50, 0.9);
            --shadow-color: rgba(0, 0, 0, 0.15);
            --gradient-start: #e8ecf5;
            --gradient-end: #f5f7fa;
            --footer-bg: rgba(255, 255, 255, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 30% 40%, var(--gradient-start) 0%, var(--gradient-end) 70%);
            background-attachment: fixed;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* 顶部栏 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background: var(--topbar-bg);
            backdrop-filter: blur(16px) saturate(200%);
            -webkit-backdrop-filter: blur(16px) saturate(200%);
            display: flex;
            align-items: center;
            padding-left: 24px;
            padding-right: 24px;
            box-shadow: 0 4px 20px var(--shadow-color);
            z-index: 1000;
            border-bottom: 1px solid var(--border-light);
            transition: all 0.4s ease;
        }

        .top-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--topbar-text);
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .top-title:hover {
            text-decoration: underline;
            transform: translateX(-50%) scale(1.02);
            opacity: 1;
        }

        /* 右侧按钮组 */
        .right-actions {
            display: flex;
            align-items: center;
            margin-left: auto;
            gap: 8px;
            position: relative;
        }

        /* 翻译按钮 */
        .translate-btn {
            background: transparent;
            border: none;
            color: var(--topbar-text);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 0;
        }

        .translate-btn img {
            width: 24px;
            height: 24px;
            display: block;
        }

        .translate-btn:hover {
            background: rgba(128, 128, 128, 0.15);
            transform: scale(1.1) rotate(15deg);
        }

        /* 主题切换 */
        .theme-toggle {
            background: transparent;
            border: none;
            color: var(--topbar-text);
            font-size: 1.5rem;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .theme-toggle:hover {
            background: rgba(128, 128, 128, 0.15);
            transform: scale(1.1) rotate(15deg);
        }

        /* 语言下拉 */
        .translate-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--glass-menu);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border-radius: 16px;
            padding: 8px 0;
            min-width: 150px;
            box-shadow: 0 18px 40px var(--shadow-color);
            border: 1px solid var(--border-light);
            z-index: 1001;
            opacity: 0;
            transform: scale(0.9) translateY(-8px);
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            transform-origin: top right;
        }

        .translate-dropdown.open {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: all;
        }

        .translate-dropdown a {
            display: block;
            color: var(--text-primary);
            text-decoration: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .translate-dropdown a:hover {
            background: var(--accent-blue);
        }

        /* 菜单按钮 */
        .menu-button {
            background: transparent;
            border: none;
            color: var(--topbar-text);
            font-size: 1.9rem;
            line-height: 1;
            cursor: pointer;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                        background 0.2s;
        }

        .menu-button:hover {
            background: rgba(128, 128, 128, 0.1);
            transform: scale(1.1) rotate(90deg);
        }

        .menu-button.active {
            transform: rotate(180deg);
            background: rgba(0, 160, 255, 0.1);
        }

        /* 侧边菜单 */
        .menu {
            position: fixed;
            top: 80px;
            left: 24px;
            width: 240px;
            background: var(--glass-menu);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border-radius: 24px;
            padding: 8px 0;
            box-shadow: 0 18px 40px var(--shadow-color);
            z-index: 999;
            border: 1px solid var(--border-light);
            transform-origin: top left;
            transform: scale(0.7) translateY(-30px);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                        opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        background-color 0.4s ease;
        }

        .menu.open {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: all;
        }

        .menu a {
            display: block;
            color: var(--text-primary);
            text-decoration: none;
            padding: 14px 24px;
            margin: 6px 12px;
            border-radius: 16px;
            font-weight: 500;
            font-size: 1rem;
            background: transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateX(-16px);
        }

        .menu.open a {
            opacity: 1;
            transform: translateX(0);
        }

        /* 菜单项延迟 */
        .menu a:nth-child(1) { transition-delay: 0.05s; }
        .menu a:nth-child(2) { transition-delay: 0.1s; }
        .menu a:nth-child(3) { transition-delay: 0.15s; }
        .menu a:nth-child(4) { transition-delay: 0.2s; }
        .menu a:nth-child(5) { transition-delay: 0.25s; }

        .menu a:hover {
            background: var(--accent-blue);
            transform: translateX(6px);
            color: var(--text-primary);
            box-shadow: 0 0 12px var(--accent-blue);
        }

        /* 3D容器 */
        .content-container {
            position: relative;
            perspective: 500px;
            margin: 20px;
            display: inline-block;
        }

        /* 玻璃层 */
        .glass-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--glass-white);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-radius: 16px;
            box-shadow: 0 20px 40px var(--shadow-color),
                        inset 0 1px 1px rgba(128, 128, 128, 0.1);
            border: 1px solid var(--border-light);
            transform-style: preserve-3d;
            transition: all 0.4s ease;
        }

        /* 文字层 */
        .content {
            position: relative;
            text-align: center;
            font-size: 2.2rem;
            margin: 30px 40px;
            padding: 30px 40px;
            color: var(--text-secondary);
            text-shadow: 0 4px 20px var(--shadow-color);
            font-weight: 500;
            letter-spacing: 1px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease-out, color 0.4s ease;
            cursor: pointer;
            line-height: 1.4;
        }

        /* 底部信息 */
        .footer {
            position: fixed;
            bottom: 25px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-primary);
            opacity: 0.7;
            text-shadow: 0 2px 5px var(--shadow-color);
            z-index: 500;
            background: var(--footer-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 12px 0 8px;
            border-top: 1px solid var(--border-light);
            transition: all 0.4s ease;
        }

        .footer p {
            margin: 4px 0;
        }

        .footer a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* 弹跳动画 */
        @keyframes bounce {
            0% { transform: scale(1); }
            35% { transform: scale(1.04); }
            60% { transform: scale(0.98); }
            85% { transform: scale(1.01); }
            100% { transform: scale(1); }
        }

        .bounce-effect {
            animation: bounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 响应式 */
        @media (max-width: 700px) {
            .content {
                font-size: 1.7rem;
                margin: 20px;
                padding: 20px;
            }
            .menu {
                width: calc(100% - 48px);
                left: 24px;
            }
            .right-actions {
                gap: 4px;
            }
        }

        @media (max-width: 450px) {
            .content {
                font-size: 1.3rem;
            }
        }

        .main-content {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 顶部栏 -->
    <div class="top-bar">
        <button class="menu-button" id="menuBtn" onclick="toggleMenu()">☰</button>
        <a href="../index.html" class="top-title" data-translate-key="top-title">返回总览</a>
        <div class="right-actions">
            <button class="translate-btn" id="translateBtn" aria-label="翻译">
                <img src="/Pictures/icon_translate.webp" alt="翻译">
            </button>
            <div class="translate-dropdown" id="translateDropdown">
                <a href="#" data-lang="zh-CN">简体中文</a>
                <a href="#" data-lang="zh-TW">繁體中文</a>
                <a href="#" data-lang="en">English</a>
                <a href="#" data-lang="ja">日本語</a>
                <a href="#" data-lang="ko">한국어</a>
            </div>
            <button class="theme-toggle" id="themeBtn" aria-label="切换主题">🌙</button>
        </div>
    </div>

    <!-- 侧边菜单 -->
    <div class="menu" id="menu">
        <a href="windows.html" data-translate-key="menu-windows">Windows源（维护中）</a>
        <a href="linux.html" data-translate-key="menu-linux">Linux源（维护中）</a>
        <a href="macos.html" data-translate-key="menu-macos">MacOS源（维护中）</a>
        <a href="others.html" data-translate-key="menu-others">杂项（维护中）</a>

    </div>

    <!-- 3D区域 -->
    <div class="content-container">
        <div class="glass-layer" id="glass-layer"></div>
        <div class="content" id="content" data-translate-key="content-message">
            本站旨在收集，整理各种官方镜像并提供下载，可点击左上角展开下载选项，点击顶部栏返回
        </div>
    </div>

    <!-- 底部信息 -->
    <div class="footer">
        <p><a href="../readme.html" data-translate-key="footer-copyright">MapleSTUDIO 版权所有</a></p>
        <p>
            <span data-translate-key="footer-powered-prefix">此站点由 </span>
            <a href="https://github.com" target="_blank">Github</a>
            <span data-translate-key="footer-powered-suffix"> 驱动</span>
        </p>
        <p><a href="https://icp.gov.moe/?keyword=20250732" target="_blank" data-translate-key="footer-icp">萌ICP备20250732号</a></p>
    </div>

    <script>
        // ========================
        // 多语言本地化数据
        // ========================
        const translations = {
            'zh-TW': {
                'top-title': '楓葉工作室',
                'menu-windows': 'Windows源（維護中）',
                'menu-linux': 'Linux源（維護中）',
                'menu-macos': 'MacOS源（維護中）',
                'menu-others': '雜項（維護中）',
                'menu-board': '公告欄',
                'content-message': '本站旨在收集、整理各種官方鏡像並提供下載，可點擊左上角展開下載選項，點擊頂部欄返回',
                'footer-copyright': 'MapleSTUDIO 版權所有',
                'footer-powered-prefix': '此站點由 ',
                'footer-powered-suffix': ' 驅動',
                'footer-icp': '萌ICP備20250732號'
            },
            'en': {
                'top-title': 'Maple Studio',
                'menu-windows': 'Windows (Maintenance)',
                'menu-linux': 'Linux (Maintenance)',
                'menu-macos': 'MacOS (Maintenance)',
                'menu-others': 'Others (Maintenance)',
                'menu-board': 'Bulletin',
                'content-message': 'This site collects and organizes official images for download. Click the top-left menu to expand options, and the top bar to return.',
                'footer-copyright': 'MapleSTUDIO All Rights Reserved',
                'footer-powered-prefix': 'Powered by ',
                'footer-powered-suffix': '',
                'footer-icp': 'MoeICP Bei 20250732'
            },
            'ja': {
                'top-title': 'メープルスタジオ',
                'menu-windows': 'Windows（メンテナンス中）',
                'menu-linux': 'Linux（メンテナンス中）',
                'menu-macos': 'MacOS（メンテナンス中）',
                'menu-others': 'その他（メンテナンス中）',
                'menu-board': '掲示板',
                'content-message': 'このサイトは公式イメージを収集・整理してダウンロードを提供しています。左上のメニューでオプションを展開し、トップバーで戻ります。',
                'footer-copyright': 'MapleSTUDIO 著作権所有',
                'footer-powered-prefix': 'このサイトは ',
                'footer-powered-suffix': ' によって運営されています',
                'footer-icp': '萌ICP備20250732号'
            },
            'ko': {
                'top-title': '메이플 스튜디오',
                'menu-windows': 'Windows (유지보수 중)',
                'menu-linux': 'Linux (유지보수 중)',
                'menu-macos': 'MacOS (유지보수 중)',
                'menu-others': '기타 (유지보수 중)',
                'menu-board': '게시판',
                'content-message': '이 사이트는 공식 이미지를 수집 및 정리하여 다운로드를 제공합니다. 왼쪽 상단 메뉴를 클릭하여 옵션을 확장하고, 상단 바로 돌아갑니다.',
                'footer-copyright': 'MapleSTUDIO 저작권 소유',
                'footer-powered-prefix': '이 사이트는 ',
                'footer-powered-suffix': ' 에 의해 구동됩니다',
                'footer-icp': '萌ICP备20250732号'
            }
        };

        const defaultTexts = new Map();

        // 缓存所有翻译元素的默认文本
        function cacheDefaultTexts() {
            document.querySelectorAll('[data-translate-key]').forEach(el => {
                const key = el.getAttribute('data-translate-key');
                if (key && !defaultTexts.has(key)) {
                    defaultTexts.set(key, el.textContent);
                }
            });
        }

        // 应用语言
        function applyLanguage(lang) {
            document.querySelectorAll('[data-translate-key]').forEach(el => {
                const key = el.getAttribute('data-translate-key');
                if (!key) return;

                if (lang === 'zh-CN') {
                    const defaultText = defaultTexts.get(key);
                    if (defaultText !== undefined) {
                        el.textContent = defaultText;
                    }
                } else {
                    const langPack = translations[lang];
                    if (langPack && langPack[key] !== undefined) {
                        el.textContent = langPack[key];
                    }
                }
            });
            localStorage.setItem('preferredLanguage', lang);
        }

        // ========================
        // 3D效果逻辑（保持不变）
        // ========================
        const content = document.getElementById('content');
        const glassLayer = document.getElementById('glass-layer');
        const resistance = 0.1; 
        const maxTilt = 20; 
        let isDragging = false;
        let offsetX = 0, offsetY = 0;

        if (matchMedia('(pointer: coarse)').matches) {
            let startX, startY;
            content.addEventListener('touchstart', (e) => {
                isDragging = true;
                startX = e.touches[0].clientX - offsetX;
                startY = e.touches[0].clientY - offsetY;
            });

            content.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    offsetX = (e.touches[0].clientX - startX) * resistance;
                    offsetY = (e.touches[0].clientY - startY) * resistance;
                    offsetX = Math.max(-maxTilt, Math.min(maxTilt, offsetX));
                    offsetY = Math.max(-maxTilt, Math.min(maxTilt, offsetY));
                    applyTilt();
                }
            });

            content.addEventListener('touchend', () => {
                isDragging = false;
                resetPosition();
            });
        }

        if (matchMedia('(pointer: fine)').matches) {
            document.addEventListener('mousemove', (e) => {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const normX = (e.clientX - centerX) / centerX;
                const normY = (e.clientY - centerY) / centerY;
                offsetX = Math.max(-maxTilt, Math.min(maxTilt, normX * maxTilt * resistance));
                offsetY = Math.max(-maxTilt, Math.min(maxTilt, -normY * maxTilt * resistance));
                applyTilt();
            });

            document.addEventListener('mouseleave', () => {
                resetPosition();
            });
        }

        function applyTilt() {
            content.style.transform = `perspective(500px) rotateX(${offsetY}deg) rotateY(${offsetX}deg)`;
            glassLayer.style.transform = `perspective(500px) rotateX(${offsetY}deg) rotateY(${offsetX}deg) translateZ(-20px)`;
        }

        function resetPosition() {
            content.style.transition = 'transform 0.5s ease-out';
            glassLayer.style.transition = 'transform 0.5s ease-out';
            content.style.transform = 'perspective(500px) rotateX(0) rotateY(0)';
            glassLayer.style.transform = 'perspective(500px) rotateX(0) rotateY(0) translateZ(-20px)';
            setTimeout(() => {
                content.style.transition = 'none';
                glassLayer.style.transition = 'none';
            }, 500);
        }

        // 菜单控制
        function toggleMenu() {
            const menu = document.getElementById('menu');
            const btn = document.getElementById('menuBtn');
            const isOpen = menu.classList.contains('open');
            
            if (isOpen) {
                menu.classList.remove('open');
                btn.classList.remove('active');
            } else {
                menu.classList.add('open');
                btn.classList.add('active');
            }
        }

        // ========================
        // 翻译按钮逻辑
        // ========================
        const translateBtn = document.getElementById('translateBtn');
        const translateDropdown = document.getElementById('translateDropdown');

        translateBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            translateDropdown.classList.toggle('open');
            this.classList.add('bounce-effect');
            setTimeout(() => this.classList.remove('bounce-effect'), 500);
        });

        translateDropdown.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const lang = this.getAttribute('data-lang');
                applyLanguage(lang);
                translateDropdown.classList.remove('open');
            });
        });

        // 点击外部关闭（菜单和翻译下拉）
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('menu');
            const btn = document.getElementById('menuBtn');
            const dropdown = document.getElementById('translateDropdown');
            const transBtn = document.getElementById('translateBtn');

            if (!menu.contains(e.target) && !btn.contains(e.target) && menu.classList.contains('open')) {
                toggleMenu();
            }

            if (dropdown && transBtn && !dropdown.contains(e.target) && !transBtn.contains(e.target)) {
                dropdown.classList.remove('open');
            }
        });

        // 阻止冒泡
        document.getElementById('menu').addEventListener('click', (e) => e.stopPropagation());
        document.getElementById('translateDropdown').addEventListener('click', (e) => e.stopPropagation());

        // ========================
        // 主题切换（原有逻辑）
        // ========================
        const themeBtn = document.getElementById('themeBtn');
        const html = document.documentElement;
        
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            html.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function updateThemeIcon(theme) {
            themeBtn.textContent = theme === 'light' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        if (themeBtn) {
            themeBtn.addEventListener('click', toggleTheme);
        }

        // ========================
        // 初始化
        // ========================
        window.addEventListener('load', () => {
            cacheDefaultTexts();
            initTheme();
            document.getElementById('menu').classList.remove('open');
            const savedLang = localStorage.getItem('preferredLanguage') || 'zh-CN';
            applyLanguage(savedLang);
        });
    </script>
</body>
</html>
