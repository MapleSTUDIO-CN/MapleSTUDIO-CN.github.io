<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title data-translate-key="page-title">支持枫树 · 扫码捐赠 & 广告支持</title>
    <link rel="icon" href="../Pictures/logo.jpg">

    <!-- Google AdSense 脚本 -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4874836697909333"
            crossorigin="anonymous">
    </script>

    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* 黑夜变量 */
            --bg-color: #0a0c10;
            --glass-white: rgba(0, 0, 0, 0.2);
            --glass-white-hover: rgba(0, 0, 0, 0.35);
            --glass-menu: rgba(30, 30, 40, 0.7);
            --accent-blue: rgba(0, 160, 255, 0.6);
            --accent-gold: #ffb432b3;
            --accent-green: rgba(80, 220, 140, 0.7);
            --border-light: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f4fa;
            --text-secondary: rgba(180, 230, 255, 0.95);
            --text-tertiary: rgba(200, 210, 230, 0.7);
            --topbar-bg: rgba(255, 255, 255, 0.75);
            --topbar-text: rgba(0, 0, 0, 0.8);
            --shadow-color: rgba(0, 0, 0, 0.5);
            --gradient-start: #1a1f2a;
            --gradient-end: #0a0c10;
            --footer-bg: rgba(10, 15, 20, 0.3);
            --card-bg: rgba(20, 24, 34, 0.55);
            --card-hover-bg: rgba(25, 30, 42, 0.7);
            --card-border: rgba(255, 255, 255, 0.06);
            --card-shadow: rgba(0, 0, 0, 0.45);
            --badge-ad-bg: #289eff26;
            --badge-ad-text: #0099ffe6;
            --badge-qr-bg: #28d1801f;
            --badge-qr-text: #28d180e6;
            --ad-placeholder-bg: rgba(30, 35, 50, 0.5);
            --ad-placeholder-text: rgba(180, 190, 210, 0.45);
            --divider-color: rgba(255, 255, 255, 0.06);
        }

        /* 白天变量 */
        [data-theme="light"] {
            --bg-color: #f0f4f8;
            --glass-white: rgba(255, 255, 255, 0.6);
            --glass-white-hover: rgba(255, 255, 255, 0.8);
            --glass-menu: rgba(240, 242, 250, 0.9);
            --accent-blue: rgba(0, 120, 255, 0.8);
            --accent-gold: rgba(220, 140, 20, 0.8);
            --accent-green: rgba(40, 170, 110, 0.8);
            --border-light: rgba(0, 0, 0, 0.08);
            --text-primary: #1a1d29;
            --text-secondary: rgba(30, 35, 50, 0.9);
            --text-tertiary: rgba(60, 65, 80, 0.7);
            --topbar-bg: rgba(255, 255, 255, 0.9);
            --topbar-text: rgba(30, 35, 50, 0.9);
            --shadow-color: rgba(0, 0, 0, 0.15);
            --gradient-start: #e8ecf5;
            --gradient-end: #f5f7fa;
            --footer-bg: rgba(255, 255, 255, 0.5);
            --card-bg: rgba(255, 255, 255, 0.55);
            --card-hover-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(0, 0, 0, 0.06);
            --card-shadow: rgba(0, 0, 0, 0.12);
            --badge-ad-bg: #1ebfff1a;
            --badge-ad-text: #0099ffe6;
            --badge-qr-bg: rgba(40, 160, 100, 0.1);
            --badge-qr-text: rgba(30, 140, 90, 0.9);
            --ad-placeholder-bg: rgba(240, 242, 248, 0.6);
            --ad-placeholder-text: rgba(120, 130, 150, 0.4);
            --divider-color: rgba(0, 0, 0, 0.06);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 30% 40%, var(--gradient-start) 0%, var(--gradient-end) 70%);
            background-attachment: fixed;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* 顶部栏 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background: var(--topbar-bg);
            backdrop-filter: blur(16px) saturate(200%);
            -webkit-backdrop-filter: blur(16px) saturate(200%);
            display: flex;
            align-items: center;
            padding-left: 24px;
            padding-right: 24px;
            box-shadow: 0 4px 20px var(--shadow-color);
            z-index: 1000;
            border-bottom: 1px solid var(--border-light);
            transition: all 0.4s ease;
        }

        .top-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--topbar-text);
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
        }

        .top-title:hover {
            text-decoration: underline;
            transform: translateX(-50%) scale(1.02);
            opacity: 1;
        }

        /* 右侧按钮组（翻译 + 主题） */
        .right-actions {
            display: flex;
            align-items: center;
            margin-left: auto;
            gap: 8px;
            position: relative;
        }

        /* 翻译按钮 */
        .translate-btn {
            background: transparent;
            border: none;
            color: var(--topbar-text);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 0;
        }

        .translate-btn img {
            width: 24px;
            height: 24px;
            display: block;
        }

        .translate-btn:hover {
            background: rgba(128, 128, 128, 0.15);
            transform: scale(1.1) rotate(15deg);
        }

        /* 主题切换按钮 */
        .theme-toggle {
            background: transparent;
            border: none;
            color: var(--topbar-text);
            font-size: 1.5rem;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .theme-toggle:hover {
            background: rgba(128, 128, 128, 0.15);
            transform: scale(1.1) rotate(15deg);
        }

        /* 翻译下拉菜单 */
        .translate-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--glass-menu);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border-radius: 16px;
            padding: 8px 0;
            min-width: 150px;
            box-shadow: 0 18px 40px var(--shadow-color);
            border: 1px solid var(--border-light);
            z-index: 1001;
            opacity: 0;
            transform: scale(0.9) translateY(-8px);
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            transform-origin: top right;
        }

        .translate-dropdown.open {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: all;
        }

        .translate-dropdown a {
            display: block;
            color: var(--text-primary);
            text-decoration: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .translate-dropdown a:hover {
            background: var(--accent-blue);
        }

        /* 菜单按钮 */
        .menu-button {
            background: transparent;
            border: none;
            color: var(--topbar-text);
            font-size: 1.9rem;
            line-height: 1;
            cursor: pointer;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                background 0.2s;
        }

        .menu-button:hover {
            background: rgba(128, 128, 128, 0.1);
            transform: scale(1.1) rotate(90deg);
        }

        .menu-button.active {
            transform: rotate(180deg);
            background: rgba(0, 160, 255, 0.1);
        }

        /* 侧边菜单（毛玻璃弹出式） */
        .menu {
            position: fixed;
            top: 80px;
            left: 24px;
            width: 240px;
            background: var(--glass-menu);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border-radius: 24px;
            padding: 8px 0;
            box-shadow: 0 18px 40px var(--shadow-color);
            z-index: 999;
            border: 1px solid var(--border-light);
            transform-origin: top left;
            transform: scale(0.7) translateY(-30px);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                background-color 0.4s ease;
        }

        .menu.open {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: all;
        }

        .menu a {
            display: block;
            color: var(--text-primary);
            text-decoration: none;
            padding: 14px 24px;
            margin: 6px 12px;
            border-radius: 16px;
            font-weight: 500;
            font-size: 1rem;
            background: transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateX(-16px);
        }

        .menu.open a {
            opacity: 1;
            transform: translateX(0);
        }

        /* 菜单项延迟 - 6项 */
        .menu a:nth-child(1) {
            transition-delay: 0.05s;
        }
        .menu a:nth-child(2) {
            transition-delay: 0.1s;
        }
        .menu a:nth-child(3) {
            transition-delay: 0.15s;
        }
        .menu a:nth-child(4) {
            transition-delay: 0.2s;
        }
        .menu a:nth-child(5) {
            transition-delay: 0.25s;
        }
        .menu a:nth-child(6) {
            transition-delay: 0.3s;
        }

        .menu a:hover {
            background: var(--accent-blue);
            transform: translateX(6px);
            color: var(--text-primary);
            box-shadow: 0 0 12px var(--accent-blue);
        }

        /* ========== 主内容区域 ========== */
        .donate-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            width: 85%;
            max-width: 1000px;
            margin: 100px auto 120px;
            padding: 0 10px;
        }

        /* 捐赠卡片 */
        .donate-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 22px;
            padding: 28px 24px 24px;
            box-shadow: 0 10px 36px var(--card-shadow),
                inset 0 1px 1px rgba(128, 128, 128, 0.08);
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(24px);
        }

        .donate-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .donate-card:hover {
            background: var(--card-hover-bg);
            transform: translateY(-6px);
            box-shadow: 0 18px 48px var(--shadow-color),
                inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }

        /* 卡片顶部微光 */
        .donate-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.03) 0%, transparent 60%);
            pointer-events: none;
            transition: opacity 0.4s;
            opacity: 0;
        }

        .donate-card:hover::before {
            opacity: 1;
        }

        /* 卡片徽章 */
        .card-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 20px;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .badge-ad {
            background: var(--badge-ad-bg);
            color: var(--badge-ad-text);
        }

        .badge-qr {
            background: var(--badge-qr-bg);
            color: var(--badge-qr-text);
        }

        /* 卡片标题 */
        .card-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
            letter-spacing: 0.2px;
        }

        /* 卡片描述 */
        .card-desc {
            font-size: 0.9rem;
            color: var(--text-tertiary);
            margin-bottom: 18px;
            line-height: 1.5;
            position: relative;
            z-index: 1;
            max-width: 280px;
        }

        /* 分隔线 */
        .card-divider {
            width: 50px;
            height: 2px;
            border-radius: 2px;
            background: var(--divider-color);
            margin-bottom: 18px;
            position: relative;
            z-index: 1;
            transition: width 0.4s ease, background 0.4s ease;
        }

        .donate-card:hover .card-divider {
            width: 70px;
        }

        .donate-card.ad-card:hover .card-divider {
            background: var(--badge-ad-text);
        }
        .donate-card.qr-card:hover .card-divider {
            background: var(--badge-qr-text);
        }

        /* ===== 广告容器 ===== */
        .ad-wrapper {
            width: 100%;
            max-width: 380px;
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--ad-placeholder-bg);
            border-radius: 14px;
            position: relative;
            z-index: 1;
            transition: background 0.4s ease;
            overflow: hidden;
        }

        .ad-wrapper ins {
            display: block;
            width: 100%;
            min-height: 280px;
        }

        /* 广告占位提示（广告未加载时显示） */
        .ad-placeholder-note {
            position: absolute;
            pointer-events: none;
            font-size: 0.78rem;
            color: var(--ad-placeholder-text);
            text-align: center;
            letter-spacing: 0.3px;
            z-index: 0;
            transition: opacity 0.5s;
        }

        /* ===== 二维码图片容器 ===== */
        .qr-image-wrapper {
            width: 100%;
            max-width: 320px;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            z-index: 1;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .qr-image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 14px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .donate-card.qr-card:hover .qr-image-wrapper {
            transform: scale(1.03);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
        }

        .donate-card.qr-card:hover .qr-image-wrapper img {
            transform: scale(1.04);
        }

        /* 二维码提示小字 */
        .qr-tip {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-top: 12px;
            position: relative;
            z-index: 1;
            letter-spacing: 0.2px;
            opacity: 0.8;
        }

        /* 卡片入场动画延迟 */
        .donate-card:nth-child(1) {
            transition-delay: 0.05s;
        }
        .donate-card:nth-child(2) {
            transition-delay: 0.18s;
        }

        /* ========== 底部信息 ========== */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-primary);
            opacity: 0.7;
            text-shadow: 0 2px 5px var(--shadow-color);
            z-index: 500;
            background: var(--footer-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 12px 0 10px;
            border-top: 1px solid var(--border-light);
            transition: all 0.4s ease;
        }

        .footer p {
            margin: 4px 0;
        }

        .footer a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* 弹跳动画 */
        @keyframes bounce {
            0% {
                transform: scale(1);
            }
            35% {
                transform: scale(1.04);
            }
            60% {
                transform: scale(0.98);
            }
            85% {
                transform: scale(1.01);
            }
            100% {
                transform: scale(1);
            }
        }

        .bounce-effect {
            animation: bounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .donate-section {
                grid-template-columns: 1fr;
                width: 90%;
                gap: 22px;
                margin: 88px auto 130px;
                padding: 0 4px;
            }

            .donate-card {
                padding: 22px 16px 20px;
                border-radius: 18px;
            }

            .card-title {
                font-size: 1.2rem;
            }
            .card-desc {
                font-size: 0.85rem;
                max-width: 240px;
            }

            .ad-wrapper {
                max-width: 100%;
                min-height: 250px;
            }
            .ad-wrapper ins {
                min-height: 250px;
            }

            .qr-image-wrapper {
                max-width: 260px;
            }

            .menu {
                width: calc(100% - 48px);
                left: 24px;
            }

            .footer {
                padding: 10px 0 8px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 420px) {
            .donate-section {
                width: 94%;
                gap: 16px;
                margin: 80px auto 120px;
            }
            .donate-card {
                padding: 18px 12px 16px;
                border-radius: 16px;
            }
            .card-title {
                font-size: 1.1rem;
            }
            .card-badge {
                font-size: 0.72rem;
                padding: 5px 10px;
            }
            .ad-wrapper {
                min-height: 200px;
            }
            .ad-wrapper ins {
                min-height: 200px;
            }
            .qr-image-wrapper {
                max-width: 220px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部栏 -->
    <div class="top-bar">
        <button class="menu-button" id="menuBtn" onclick="toggleMenu()">☰</button>
        <a href="../index.html" class="top-title" data-translate-key="top-title">返回总览</a>
        <div class="right-actions">
            <button class="translate-btn" id="translateBtn" aria-label="翻译">
                <img src="/Pictures/icon_translate.webp" alt="翻译">
            </button>
            <div class="translate-dropdown" id="translateDropdown">
                <a href="#" data-lang="zh-CN">简体中文</a>
                <a href="#" data-lang="zh-TW">繁體中文</a>
                <a href="#" data-lang="en">English</a>
                <a href="#" data-lang="ja">日本語</a>
                <a href="#" data-lang="ko">한국어</a>
            </div>
            <button class="theme-toggle" id="themeBtn" aria-label="切换主题">🌙</button>
        </div>
    </div>

    <!-- 侧边菜单（完整6项） -->
    <div class="menu" id="menu">
        <a href="../mirror/mirror.html" data-translate-key="menu-mirror">镜像站(🚧)</a>
        <a href="../mcsever/main.html" data-translate-key="menu-mcserver">MC服务器</a>
        <a href="../mcapks.html" data-translate-key="menu-mcapks">MC版本库(🚫)</a>
        <a href="../software/main.html" data-translate-key="menu-software">软件库</a>
        <a href="../tools/main.html" data-translate-key="menu-tools">小工具(🚫)</a>
        <a href="../main/bulletin_board.html" data-translate-key="menu-bulletin">公告栏</a>
    </div>

    <!-- ========== 双卡片捐赠区域 ========== -->
    <section class="donate-section" id="donateSection">

        <!-- 卡片1：Google Ads 免费支持 -->
        <div class="donate-card ad-card" id="adCard">
            <span class="card-badge badge-ad" data-translate-key="donate-ad-badge">免费支持</span>
            <h3 class="card-title" data-translate-key="donate-ad-title">广告支持</h3>
            <p class="card-desc" data-translate-key="donate-ad-desc">点击GoogleADS以支持枫树继续运营</p>
            <div class="card-divider"></div>
            <div class="ad-wrapper" id="adWrapper">
                <!-- Google AdSense 广告单元 -->
                <!--
                ★ 重要提示：请将 data-ad-slot 的值替换为您在 Google AdSense 后台创建的广告单元ID。
                ★ 如果您使用的是 AdSense 自动广告，此处的广告单元可能不是必需的。
                ★ 当前 data-ad-slot 为占位值，广告可能无法正常展示。
                -->
                <ins class="adsbygoogle"
                     style="display:block; width:100%; min-height:280px;"
                     data-ad-client="ca-pub-4874836697909333"
                     data-ad-slot="XXXXXXXXXX"
                     data-ad-format="auto"

        const defaultTexts = new Map();

        function cacheDefaultTexts() {
            document.querySelectorAll('[data-translate-key]').forEach(el => {
                const key = el.getAttribute('data-translate-key');
                if (key && !defaultTexts.has(key)) {
                    defaultTexts.set(key, el.textContent);
                }
            });
        }

        function applyLanguage(lang) {
            // 更新页面标题
            const titleEl = document.querySelector('title[data-translate-key]');
            if (titleEl) {
                const key = titleEl.getAttribute('data-translate-key');
                if (lang === 'zh-CN') {
                    titleEl.textContent = defaultTexts.get(key) || '支持枫树 · 扫码捐赠 & 广告支持';
                } else {
                    const langPack = translations[lang];
                    if (langPack && langPack[key]) {
                        titleEl.textContent = langPack[key];
                    }
                }
            }

            document.querySelectorAll('[data-translate-key]').forEach(el => {
                if (el.tagName === 'TITLE') return;
                const key = el.getAttribute('data-translate-key');
                if (!key) return;

                if (lang === 'zh-CN') {
                    const defaultText = defaultTexts.get(key);
                    if (defaultText !== undefined) {
                        el.textContent = defaultText;
                    }
                } else {
                    const langPack = translations[lang];
                    if (langPack && langPack[key] !== undefined) {
                        el.textContent = langPack[key];
                    }
                }
            });

            localStorage.setItem('preferredLanguage', lang);
        }

        // 菜单控制
        function toggleMenu() {
            const menu = document.getElementById('menu');
            const btn = document.getElementById('menuBtn');
            const isOpen = menu.classList.contains('open');

            if (isOpen) {
                menu.classList.remove('open');
                btn.classList.remove('active');
            } else {
                menu.classList.add('open');
                btn.classList.add('active');
            }
        }

        // 翻译下拉
        const translateBtn = document.getElementById('translateBtn');
        const translateDropdown = document.getElementById('translateDropdown');

        translateBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            translateDropdown.classList.toggle('open');
            this.classList.add('bounce-effect');
            setTimeout(() => this.classList.remove('bounce-effect'), 500);
        });

        translateDropdown.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const lang = this.getAttribute('data-lang');
                applyLanguage(lang);
                translateDropdown.classList.remove('open');
            });
        });

        // 点击外部关闭
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('menu');
            const btn = document.getElementById('menuBtn');
            const dropdown = document.getElementById('translateDropdown');
            const transBtn = document.getElementById('translateBtn');

            if (!menu.contains(e.target) && !btn.contains(e.target) && menu.classList.contains('open')) {
                toggleMenu();
            }
            if (dropdown && transBtn && !dropdown.contains(e.target) && !transBtn.contains(e.target)) {
                dropdown.classList.remove('open');
            }
        });

        document.getElementById('menu').addEventListener('click', (e) => e.stopPropagation());
        document.getElementById('translateDropdown').addEventListener('click', (e) => e.stopPropagation());

        // 主题切换
        const themeBtn = document.getElementById('themeBtn');
        const html = document.documentElement;

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            html.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function updateThemeIcon(theme) {
            themeBtn.textContent = theme === 'light' ? '☀️' : '🌙';
        }

        themeBtn.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });

        // 卡片入场动画（Intersection Observer）
        function setupCardAnimations() {
            const cards = document.querySelectorAll('.donate-card');

            // 如果浏览器支持 IntersectionObserver，使用它
            if ('IntersectionObserver' in window) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, {
                    threshold: 0.15,
                    rootMargin: '0px 0px -30px 0px'
                });

                cards.forEach(card => observer.observe(card));
            } else {
                // 降级方案：直接延迟显示
                cards.forEach((card, index) => {
                    setTimeout(() => {
                        card.classList.add('visible');
                    }, 200 + index * 150);
                });
            }
        }

        // 广告加载后隐藏占位文字
        function setupAdObserver() {
            const adWrapper = document.getElementById('adWrapper');
            const placeholder = adWrapper.querySelector('.ad-placeholder-note');
            if (!placeholder) return;

            // 使用 MutationObserver 监听广告容器变化
            if ('MutationObserver' in window) {
                const observer = new MutationObserver(() => {
                    const insEl = adWrapper.querySelector('ins');
                    if (insEl && insEl.clientHeight > 10) {
                        placeholder.style.opacity = '0';
                        // 广告成功加载后可以断开观察
                        setTimeout(() => {
                            if (insEl.clientHeight > 10) {
                                placeholder.style.display = 'none';
                            }
                        }, 800);
                        observer.disconnect();
                    }
                });
                observer.observe(adWrapper, { childList: true, subtree: true, attributes: true });
                // 5秒后如果广告仍未加载，保留占位文字但降低不透明度
                setTimeout(() => {
                    const insEl = adWrapper.querySelector('ins');
                    if (!insEl || insEl.clientHeight < 10) {
                        placeholder.style.opacity = '0.35';
                    }
                }, 5000);
            }
        }

        // 初始化
        window.addEventListener('load', () => {
            cacheDefaultTexts();
            initTheme();
            document.getElementById('menu').classList.remove('open');
            const savedLang = localStorage.getItem('preferredLanguage') || 'zh-CN';
            applyLanguage(savedLang);
            setupCardAnimations();
            setupAdObserver();
        });

        // 页面可见性变化时，如果广告未加载则尝试刷新（部分广告拦截器会延迟加载）
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                const adWrapper = document.getElementById('adWrapper');
                const insEl = adWrapper ? adWrapper.querySelector('ins') : null;
                if (insEl && insEl.clientHeight < 10 && window.adsbygoogle) {
                    try {
                        window.adsbygoogle.push({});
                    } catch (e) {
                        // 静默处理
                    }
                }
            }
        });
    </script>
